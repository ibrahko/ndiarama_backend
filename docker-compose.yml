version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ndiarama_web
    command: gunicorn config.wsgi:application -w 4 -b 0.0.0.0:8000
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    container_name: ndiarama_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ndiarama}
      POSTGRES_USER: ${POSTGRES_USER:-ndiarama}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ndiarama}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: ndiarama_redis
    ports:
      - "6379:6379"

volumes:
  db_data:
  static_volume:
  media_volume: